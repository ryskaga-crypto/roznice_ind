<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychologia Różnic Indywidualnych – Nauka na Egzamin</title>
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface2: #f4f3ef;
    --border: #e0ddd5;
    --text: #2c2c2c;
    --text-muted: #6b6860;
    --accent: #4a6fa5;
    --accent-light: #e8eef7;
    --correct: #2e7d32;
    --correct-bg: #e8f5e9;
    --wrong: #c62828;
    --wrong-bg: #ffebee;
    --neutral-hover: #eeede9;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.65;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.01em;
    flex: 1;
  }
  #home-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1.1rem;
    line-height: 1;
    padding: 6px 10px;
    cursor: pointer;
    font-family: inherit;
    margin-right: 12px;
    transition: all 0.15s;
  }
  #home-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  #score-display {
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  /* Block tabs */
  .block-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab-btn:hover { background: var(--neutral-hover); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  /* Progress bar */
  .block-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .question-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .question-text {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 22px;
    line-height: 1.55;
  }
  .options-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    width: 100%;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--neutral-hover);
    border-color: var(--accent);
  }
  .option-btn .opt-label {
    font-weight: 700;
    color: var(--accent);
    min-width: 18px;
    flex-shrink: 0;
  }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option-btn.correct .opt-label { color: var(--correct); }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn.wrong .opt-label { color: var(--wrong); }
  .option-btn:disabled { cursor: default; }
  /* Mini lesson */
  .mini-lesson {
    display: none;
    margin-top: 18px;
    padding: 22px 24px;
    background: #eef3fb;
    border-left: 5px solid var(--accent);
    border-radius: 0 10px 10px 0;
    font-size: 1rem;
    line-height: 1.85;
    color: #1a1a2e;
  }
  .mini-lesson.visible { display: block; }
  .mini-lesson strong {
    color: #1a3a6e;
    font-weight: 700;
  }
  .mini-lesson em {
    font-style: italic;
    color: #2a4a7e;
  }
  .mini-lesson .lesson-title {
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
    border-bottom: 1px solid #c5d5ee;
    padding-bottom: 6px;
  }
  /* Navigation */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.88rem;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--neutral-hover); }
  .nav-btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .nav-btn.primary:hover { background: #3a5f95; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  /* Block summary */
  .block-summary {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .block-summary.visible { display: block; }
  .block-summary h2 { font-size: 1.4rem; margin-bottom: 12px; color: var(--accent); }
  .block-summary p { color: var(--text-muted); margin-bottom: 24px; }
  .score-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }
  /* Flag button */
  .question-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
  }
  .flag-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: inherit;
    line-height: 1;
  }
  .flag-btn:hover { background: #fff3e0; color: #e65100; border-color: #e65100; }
  .flag-btn.flagged { color: #c62828; border-color: #e65100; background: #fff3e0; }
  .question-card.is-flagged { border-left: 4px solid #e65100; }
  .tab-btn.flag-tab { color: #e65100; border-color: #e0a060; }
  .tab-btn.flag-tab:hover { background: #fff3e0; }
  .tab-btn.flag-tab.active { background: #e65100 !important; border-color: #e65100 !important; color: #fff !important; }
  /* All done */
  #all-done {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }
  #all-done h2 { font-size: 1.6rem; color: var(--accent); margin-bottom: 16px; }
  #all-done p { color: var(--text-muted); font-size: 1rem; }
</style>
</head>
<body>
<header>
  <button id="home-btn" onclick="goHome()" title="Strona główna">🏠</button>
  <h1>Psychologia Różnic Indywidualnych</h1>
  <div id="score-display">Wynik: <span id="score-correct">0</span> / <span id="score-total">0</span></div>
</header>

<div class="container">
  <div class="block-tabs" id="block-tabs"></div>

  <div class="block-progress">
    <span class="progress-label" id="prog-label">Pytanie 1 z N</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="question-area"></div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="prevQuestion()">← Poprzednie</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextQuestion()">Następne →</button>
  </div>

  <div class="block-summary" id="block-summary">
    <div class="score-circle" id="bs-score"></div>
    <h2 id="bs-title"></h2>
    <p id="bs-text"></p>
    <button class="nav-btn primary" onclick="nextBlock()">Następny blok →</button>
    <button class="nav-btn" style="margin-top:10px" onclick="restartBlock()">Powtórz blok</button>
  </div>

  <div id="all-done">
    <div class="score-circle" id="ad-score"></div>
    <h2>Koniec! Świetna robota!</h2>
    <p id="ad-text"></p>
    <button class="nav-btn primary" style="margin-top:24px" onclick="restartAll()">Zacznij od początku</button>
  </div>
</div>

<script>
const BLOCKS = [
  {
    id: 'b1',
    name: 'Blok 1: Paradygmat PRI',
    shortName: 'Paradygmat',
    questions: [
      {
        q: 'Kto jest uważany za twórcę psychologii różnic indywidualnych i wprowadził pojęcie korelacji?',
        opts: ['Charles Darwin', 'Francis Galton', 'Karl Pearson', 'Adolphe Quetelet'],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Francis Galton</strong> (kuzyn Darwina) założył w Londynie pierwsze laboratorium różnic indywidualnych i jako pierwszy zmierzył ludzkie cechy statystycznie – stąd uważany jest za pioniera PRI. Jego asystentem był <strong>Karl Pearson</strong>, który sformalizował matematykę korelacji, natomiast <strong>Quetelet</strong> był belgijskim statystykiem, który wpłynął na Galtona koncepcją „przeciętnego człowieka". Darwin stworzył teorię ewolucji, ale to Galton zastosował ją do różnic między ludźmi.`
      },
      {
        q: 'Analiza czynnikowa jako narzędzie redukcji macierzy korelacji do ortogonalnych wektorów została wprowadzona przez:',
        opts: ['Galtona w 1869 r.', 'Spearmana w 1904 r.', 'Thurstona w 1938 r.', 'Pearsona w 1895 r.'],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Charles Spearman (1904)</strong> opublikował pierwszą analizę czynnikową, wyodrębniając czynnik ogólny inteligencji <em>g</em>. Galton mierzył proste cechy sensoryczne i motoryczne; Thurstone rozwinął analizę wieloczynnikową (7 zdolności pierwotnych) dopiero w 1938 r.; Pearson opracował matematykę statystyki, ale nie stosował jej do eksploracji struktury cech psychicznych w ten sposób.`
      },
      {
        q: 'Które z poniższych twierdzeń o Wielkiej Piątce (Big Five) jest BŁĘDNE?',
        opts: [
          'Czynniki Wielkiej Piątki wyłoniły się w wyniku analiz leksykalnych i czynnikowych',
          'Wielka Piątka opisuje pięć ortogonalnych wymiarów osobowości',
          'Lewis Goldberg sformułował hipotezę leksykalną mówiącą, że wszystkie deskryptory osobowości są zakodowane w języku',
          'Wielka Piątka została zaproponowana przez Eysencka jako uzupełnienie jego modelu PEN'
        ],
        correct: 3,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Eysenck NIE zaproponował Wielkiej Piątki</strong> – jego model to PEN (Psychotyczność, Ekstrawersja, Neurotyczność), czyli 3 czynniki. Wielka Piątka (OCEAN: Otwartość, Sumienność, Ekstrawersja, Ugodowość, Neurotyczność) wyłoniła się z tradycji leksykalnej (Allport, Cattell, Tupes i Christal, Goldberg, Costa i McCrae). Hipoteza leksykalna Goldberga mówi, że wszystkie ważne różnice między ludźmi są zakodowane w języku naturalnym – to prawda.`
      },
      {
        q: 'Hipoteza leksykalna w PRI zakłada, że:',
        opts: [
          'Cechy osobowości można zmierzyć wyłącznie za pomocą testów projekcyjnych',
          'Wszystkie ważne różnice indywidualne są zakodowane w słownictwie naturalnego języka',
          'Słownictwo emocjonalne jest ważniejsze niż słownictwo cech temperamentu',
          'Języki różnią się liczbą cech osobowości, które opisują'
        ],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Hipoteza leksykalna</strong> (Galton, rozwinięta przez Allporta i Odbert, usystematyzowana przez Goldberga) głosi, że jeśli jakaś cecha jest ważna dla życia społecznego, to z biegiem czasu trafi do języka jako słowo. Im bardziej istotna cecha, tym więcej synonimów. Stąd listy przymiotników opisujących ludzi stanowią punkt wyjścia do analizy czynnikowej i odkrycia Wielkiej Piątki.`
      },
      {
        q: 'Wariancja genetyczna cechy psychologicznej składa się z kilku komponentów. Który z nich odnosi się do efektu interakcji między różnymi genami (nie allelami w tym samym locus)?',
        opts: ['Wariancja addytywna', 'Wariancja dominacji', 'Epistaza (wariancja interakcyjna)', 'Wariancja środowiskowa dzielona'],
        correct: 2,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div>Wariancja genetyczna ma trzy składniki: <strong>addytywna</strong> – suma prostych efektów poszczególnych alleli (to ona odpowiada za podobieństwo rodzic-dziecko); <strong>dominacja</strong> – interakcja między allelami w tym samym locus genetycznym; <strong>epistaza</strong> – interakcja między różnymi loci (różnymi genami). Wariancja środowiskowa dzielona (e²) to wpływ wspólnego środowiska (np. ta sama rodzina) i nie jest składnikiem wariancji genetycznej.`
      },
      {
        q: 'Zgodnie z paradygmatem PRI, modele liniowe są odpowiednie przede wszystkim dla zmiennych z:',
        opts: [
          'Długim horyzontem czasu i nieliniowymi zależnościami',
          'Krótkim horyzontem czasu i lokalnymi, liniowymi zależnościami',
          'Zmiennymi środowiskowymi wyłącznie',
          'Pomiarami powtarzanymi w schemacie podłużnym'
        ],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div>Modele liniowe zakładają stałe relacje między zmiennymi i addytywność efektów, dlatego sprawdzają się dobrze w <strong>krótkim horyzoncie czasu</strong>, gdy układ jest lokalnie stabilny. W długim horyzoncie pojawiają się nieliniowości, sprzężenia zwrotne i efekty interakcji – wtedy liniowe aproksymacje zawodzą. Nosal podkreśla to w kontekście ograniczeń klasycznych modeli psychometrycznych.`
      },
      {
        q: 'Który badacz jako pierwszy wyodrębnił czynnik g (inteligencji ogólnej) stosując analizę czynnikową wyników testów?',
        opts: ['Lewis Goldberg', 'Raymond Cattell', 'Charles Spearman', 'Hans Eysenck'],
        correct: 2,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Charles Spearman (1904)</strong> zauważył, że wyniki różnych testów poznawczych korelują ze sobą dodatnio. Wyodrębnił czynnik ogólny <em>g</em> (general intelligence) oraz czynniki specyficzne <em>s</em>. To kamień milowy w historii psychometrii. Cattell rozróżnił później inteligencję płynną (Gf) i skrystalizowaną (Gc); Eysenck badał związki między <em>g</em> a szybkością procesów nerwowych; Goldberg to hipoteza leksykalna i Wielka Piątka.`
      },
      {
        q: 'Które z poniższych podejść do opisu różnic indywidualnych NIE należy do nurtu psychometrii czynnikowej?',
        opts: [
          'Model PEN Eysencka',
          'Wielka Piątka Costy i McCrae',
          'RTT (Regulacyjna Teoria Temperamentu) Strelaua',
          'Model 16PF Cattella'
        ],
        correct: 2,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>RTT Strelaua</strong> wywodzi się z tradycji fizjologiczno-regulacyjnej (Pawłow → Tiepłow → Strelau), a nie z analizy czynnikowej. Jej 6 cech temperamentu (Żwawość, Perseweracja, Wrażliwość sensoryczna, Reaktywność emocjonalna, Wytrzymałość, Aktywność) zostało określonych na podstawie teorii regulacyjnej funkcji temperamentu, nie przez eksploracyjną analizę czynnikową. PEN, Big Five i 16PF to klasyczne modele czynnikowe.`
      },
      {
        q: 'Który z poniższych naukowców był asystentem Galtona i rozwinął matematyczne podstawy korelacji i regresji?',
        opts: ['Adolphe Quetelet', 'Wilhelm Wundt', 'Karl Pearson', 'Alfred Binet'],
        correct: 2,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Karl Pearson</strong> był bezpośrednim współpracownikiem i intelektualnym następcą Galtona. Sformalizował i rozwinął współczynnik korelacji (r Pearsona), analizę regresji i podstawy statystyki opisowej. Quetelet wpłynął na Galtona, ale go poprzedzał; Wundt to twórca laboratorium eksperymentalnego w Lipsku; Binet stworzył pierwsze testy inteligencji dla dzieci we Francji.`
      },
      {
        q: 'W kontekście PRI, które stwierdzenie dotyczące dziedziczności (h²) jest PRAWIDŁOWE?',
        opts: [
          'Wskaźnik h² mówi, ile procent zmienności danej cechy u konkretnej osoby pochodzi z genów',
          'Wskaźnik h² odnosi się do wariancji cechy w populacji wyjaśnianej przez różnice genetyczne',
          'Wysoka h² oznacza, że środowisko nie ma żadnego wpływu na tę cechę',
          'Dziedziczność h² jest stała niezależnie od populacji i środowiska'
        ],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Dziedziczność h²</strong> to proporcja wariancji cechy w populacji wyjaśniana przez różnice genetyczne między ludźmi – jest to miara populacyjna, nie indywidualna. Nie mówi, ile genów "ma" konkretna osoba. Wysoka h² nie wyklucza wpływu środowiska (np. wzrost jest bardzo dziedziczny, ale populacje niedożywione są niższe). H² zmienia się w zależności od populacji i środowiska – w jednorodnym środowisku rośnie, bo ubywa wariancji środowiskowej.`
      },
      {
        q: 'Który badacz wprowadził pojęcie eugeniki i był zwolennikiem selekcji ludzi o pożądanych cechach?',
        opts: ['Quetelet', 'Galton', 'Binet', 'Spearman'],
        correct: 1,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div><strong>Francis Galton</strong> ukuł termin „eugenika" (gr. eu = dobry, genos = ród). Chciał poprawić pulę genową ludzkości przez zachęcanie zdolnych do rozmnażania (eugenika pozytywna) i odstraszanie „niezdolnych" (eugenika negatywna). Dziś projekt ten jest etycznie potępiany, ale historycznie wynikał z entuzjazmu Galtona dla darwinizmu i statystyki. Quetelet zajmował się statystyką społeczną, Binet testami inteligencji, Spearman analizą czynnikową.`
      },
      {
        q: 'W paradygmacie PRI zakłada się, że cechy psychologiczne (traits) mają charakter:',
        opts: [
          'Wyłącznie sytuacyjny – zachowanie zmienia się całkowicie w zależności od kontekstu',
          'Stabilny i ponadsytuacyjny – jednostka ujawnia podobne tendencje w różnych sytuacjach',
          'Zmienny biologicznie po 25. roku życia',
          'Jednowymiarowy – każda cecha istnieje niezależnie od innych'

      },
      {
        q: 'Różnica między aktywacją (A) a aktywowalnością (Akt) polega na tym, że:',
        opts: [
          'A to aktualny stan pobudzenia w układzie nerwowym, zaś Akt to chroniczny poziom pobudzenia charakterystyczny dla danej jednostki',

          'A odnosi się do ośrodkowego układu nerwowego, Akt zaś do autonomicznego układu nerwowego',
          'A jest synonimem siły procesu pobudzenia, zaś Akt synonimem dynamiczności procesów nerwowych'
        ],
        correct: 0,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div"><strong>Aktywacja</strong> to chwilowy, <strong>aktualny stan pobudzenia</strong> w danym momencie, zmienny w czasie. <strong>Aktywowalność</strong> to <strong>chroniczna, stała tendencja</strong> danej osoby do reagowania określonym poziomem aktywacji (cecha, nie stan) – np. ekstrawertycy mają chronicznie niską aktywowalność. To rozróżnienie stan vs cecha, nie podział na struktury anatomiczne.`

        lesson: `<div class="lesson-title">📌 Mini-lekcja</div">Konfiguracja <strong>niezharmonizowana</strong> (nieefektywna regulacja stymulacji) w RTT to: <strong>mała wytrzymałość + duża reaktywność emocjonalna + duża aktywność</strong> – sprzeczność, bo duża aktywność generuje dużo stymulacji, której osoba o małej wytrzymałości i dużej reaktywności nie jest w stanie efektywnie przetworzyć. Konfiguracja zharmonizowana łączy cechy w sposób wzajemnie kompensujący się (np. mała wytrzymałość z małą aktywnością).`

        correct: 3,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div">W dwuczynnikowej teorii <strong>Spearmana</strong> czynnik g (ogólny) i czynniki s (specyficzne, jeden na zadanie) są z założenia <strong>niezależne (nieskorelowane)</strong> – każde zadanie umysłowe jest sumą wkładu g i własnego, niezależnego s. Stwierdzenie, że „g i s są zależne", jest więc błędne wobec oryginalnej teorii Spearmana.`
      },
      {
        q: 'Z czym najsilniej koreluje inteligencja skrystalizowana (gc), według badań Horna?',
        opts: ['z czytaniem ze zrozumieniem', 'z zakresem pamięci', 'z rozumowaniem na materiale obrazowym', 'z rozwiązywaniem sylogizmów'],
        correct: 0,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div">W tabeli korelacji Horna, <strong>szybkie czytanie ze zrozumieniem</strong> ma najwyższy ładunek czynnika gc (.68) ze wszystkich badanych zadań – znacznie wyższy niż zakres pamięci (.001) czy rozumowanie na materiale obrazowym (.01), które są za to silnie nasycone czynnikiem gf, nie gc.`
      },
      {
        q: 'Krytyka Gustafssona (1984) wobec teorii Cattella i Horna dotyczyła tego, że:',
        opts: [
          'rozróżnienie między czynnikiem g a inteligencją płynną (Gf) jest niejasne i pojęcia te powinny być traktowane jako tożsame',
          'inteligencja skrystalizowana w ogóle nie istnieje jako odrębny konstrukt',
          'czynnik g nie ma żadnego podłoża empirycznego',
          'model Cattella-Horna pomija istnienie zdolności specjalnych'
        ],
        correct: 0,
        lesson: `<div class="lesson-title">📌 Mini-lekcja</div">Gustafsson (1984), stosując konfirmacyjną analizę czynnikową, wykazał, że w teorii Cattella i Horna <strong>rozróżnienie między czynnikiem g a inteligencją płynną (Gf) jest niejasne</strong> – statystycznie pojęcia te zachowują się tak, jakby były tożsame (silnie nasycają się wzajemnie). To jedna z głównych krytyk klasycznego modelu Gf-Gc, którą częściowo rozwiązał później model CHC.`
      }
    ]
  }
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentBlock = 0;
let currentQ = 0;
let answered = {}; // key: "blockIdx_qIdx" → { chosen }
let flagged = new Set();      // Set of "bi_qi" keys
let flaggedMode = false;
let flaggedList = [];         // [{bi, qi}] snapshot when entering flagged mode
let currentFlaggedIdx = 0;

// ─── Flags persistence ────────────────────────────────────────────────────────
function loadFlags() {
  try {
    const raw = localStorage.getItem('quiz_flagged');
    if (raw) JSON.parse(raw).forEach(k => flagged.add(k));
  } catch(e) {}
}

function saveFlags() {
  try { localStorage.setItem('quiz_flagged', JSON.stringify([...flagged])); } catch(e) {}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  loadFlags();
  buildTabs();
  renderBlock(0);
}

function buildTabs() {
  const wrap = document.getElementById('block-tabs');
  wrap.innerHTML = '';
  BLOCKS.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentBlock && !flaggedMode ? ' active' : '');
    btn.textContent = b.shortName;
    btn.onclick = () => switchBlock(i);
    wrap.appendChild(btn);
  });
  const flagBtn = document.createElement('button');
  flagBtn.className = 'tab-btn flag-tab' + (flaggedMode ? ' active' : '');
  flagBtn.id = 'tab-flagged';
  flagBtn.onclick = switchToFlagged;
  flagBtn.textContent = `🚩 Oflagowane (${flagged.size})`;
  wrap.appendChild(flagBtn);
}

function updateFlaggedTab() {
  const btn = document.getElementById('tab-flagged');
  if (btn) btn.textContent = `🚩 Oflagowane (${flagged.size})`;
}

function goHome() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchBlock(idx) {
  flaggedMode = false;
  currentBlock = idx;
  currentQ = 0;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn:not(.flag-tab)')[idx].classList.add('active');
  renderBlock(idx);
}

function switchToFlagged() {
  if (flagged.size === 0) {
    alert('Brak oflagowanych pytań. Zaznacz pytania flagą lub odpowiedz błędnie, żeby tu trafiły.');
    return;
  }
  flaggedMode = true;
  flaggedList = [...flagged].map(k => {
    const [bi, qi] = k.split('_').map(Number);
    return { bi, qi };
  });
  currentFlaggedIdx = 0;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const flagTab = document.getElementById('tab-flagged');
  if (flagTab) flagTab.classList.add('active');
  document.getElementById('block-summary').classList.remove('visible');
  document.getElementById('all-done').style.display = 'none';
  document.getElementById('question-area').style.display = '';
  renderFlaggedQuestion();
  updateFlaggedProgress();
  updateFlaggedNav();
}

// ─── Flag toggle ──────────────────────────────────────────────────────────────
function toggleFlag(bi, qi) {
  const key = `${bi}_${qi}`;
  if (flagged.has(key)) {
    flagged.delete(key);
    if (flaggedMode) {
      flaggedList = flaggedList.filter(item => !(item.bi === bi && item.qi === qi));
      if (flaggedList.length === 0) {
        flaggedMode = false;
        saveFlags();
        buildTabs();
        renderBlock(currentBlock);
        return;
      }
      if (currentFlaggedIdx >= flaggedList.length) currentFlaggedIdx = flaggedList.length - 1;
      saveFlags();
      updateFlaggedTab();
      renderFlaggedQuestion();
      updateFlaggedProgress();
      updateFlaggedNav();
      return;
    }
  } else {
    flagged.add(key);
  }
  saveFlags();
  updateFlaggedTab();
  if (flaggedMode) {
    renderFlaggedQuestion();
    updateFlaggedProgress();
    updateFlaggedNav();
  } else {
    renderQuestion(currentBlock, currentQ);
  }
}

function autoFlag(bi, qi) {
  const key = `${bi}_${qi}`;
  if (!flagged.has(key)) {
    flagged.add(key);
    saveFlags();
    updateFlaggedTab();
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderBlock(blockIdx) {
  const area = document.getElementById('question-area');
  const summary = document.getElementById('block-summary');
  const allDone = document.getElementById('all-done');
  summary.classList.remove('visible');
  allDone.style.display = 'none';
  area.style.display = '';
  renderQuestion(blockIdx, currentQ);
  updateProgress(blockIdx);
  updateNav(blockIdx);
  updateScore();
}

function _questionCardHtml(block, bi, q, qi, isFlagged, prev) {
  const letters = ['a', 'b', 'c', 'd', 'e'];
  const optionsHtml = q.opts.map((opt, i) => {
    let cls = 'option-btn';
    let disabled = '';
    if (prev !== undefined) {
      disabled = 'disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === prev.chosen) cls += ' wrong';
    }
    return `<li><button class="${cls}" ${disabled} onclick="answer(${bi},${qi},${i})">
      <span class="opt-label">${letters[i]})</span>
      <span>${opt}</span>
    </button></li>`;
  }).join('');
  const lessonHtml = prev !== undefined ? `<div class="mini-lesson visible">${q.lesson}</div>` : '';
  const flagLabel = isFlagged ? '🚩 Oflagowane' : '🏳 Oflaguj';
  const flagCls = isFlagged ? 'flag-btn flagged' : 'flag-btn';
  return { optionsHtml, lessonHtml, flagLabel, flagCls };
}

function renderQuestion(blockIdx, qIdx) {
  const block = BLOCKS[blockIdx];
  const q = block.questions[qIdx];
  const key = `${blockIdx}_${qIdx}`;
  const prev = answered[key];
  const isFlagged = flagged.has(key);
  const { optionsHtml, lessonHtml, flagLabel, flagCls } = _questionCardHtml(block, blockIdx, q, qIdx, isFlagged, prev);
  const meta = `${block.name} · Pytanie ${qIdx + 1} z ${block.questions.length}`;
  document.getElementById('question-area').innerHTML = `
    <div class="question-card${isFlagged ? ' is-flagged' : ''}">
      <div class="question-meta-row">
        <div class="question-meta">${meta}</div>
        <button class="${flagCls}" onclick="toggleFlag(${blockIdx},${qIdx})">${flagLabel}</button>
      </div>
      <div class="question-text">${q.text || q.q}</div>
      <ul class="options-list">${optionsHtml}</ul>
      ${lessonHtml}
    </div>`;
}

function renderFlaggedQuestion() {
  if (flaggedList.length === 0) return;
  const { bi, qi } = flaggedList[currentFlaggedIdx];
  const block = BLOCKS[bi];
  const q = block.questions[qi];
  const key = `${bi}_${qi}`;
  const prev = answered[key];
  const isFlagged = flagged.has(key);
  const { optionsHtml, lessonHtml, flagLabel, flagCls } = _questionCardHtml(block, bi, q, qi, isFlagged, prev);
  const meta = `${block.shortName} · Oflagowane ${currentFlaggedIdx + 1} z ${flaggedList.length}`;
  document.getElementById('question-area').innerHTML = `
    <div class="question-card${isFlagged ? ' is-flagged' : ''}">
      <div class="question-meta-row">
        <div class="question-meta">${meta}</div>
        <button class="${flagCls}" onclick="toggleFlag(${bi},${qi})">${flagLabel}</button>
      </div>
      <div class="question-text">${q.text || q.q}</div>
      <ul class="options-list">${optionsHtml}</ul>
      ${lessonHtml}
    </div>`;
}

function updateFlaggedProgress() {
  const pct = flaggedList.length > 0 ? Math.round((currentFlaggedIdx + 1) / flaggedList.length * 100) : 0;
  document.getElementById('prog-label').textContent = `Oflagowane: ${currentFlaggedIdx + 1} z ${flaggedList.length}`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function updateFlaggedNav() {
  document.getElementById('btn-prev').disabled = currentFlaggedIdx === 0;
  const btn = document.getElementById('btn-next');
  btn.textContent = currentFlaggedIdx === flaggedList.length - 1 ? 'Koniec →' : 'Następne →';
  btn.disabled = false;
}

function updateProgress(blockIdx) {
  const block = BLOCKS[blockIdx];
  const n = block.questions.length;
  const pct = n > 0 ? Math.round((currentQ + 1) / n * 100) : 0;
  document.getElementById('prog-label').textContent = `Pytanie ${currentQ + 1} z ${n}`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function updateNav(blockIdx) {
  const block = BLOCKS[blockIdx];
  document.getElementById('btn-prev').disabled = currentQ === 0;
  const isLast = currentQ === block.questions.length - 1;
  const btn = document.getElementById('btn-next');
  btn.textContent = isLast ? 'Wyniki bloku →' : 'Następne →';
  btn.disabled = false;
}

function updateScore() {
  let correct = 0, total = 0;
  BLOCKS.forEach((b, bi) => {
    b.questions.forEach((q, qi) => {
      const k = `${bi}_${qi}`;
      if (answered[k] !== undefined) {
        total++;
        if (answered[k].chosen === q.correct) correct++;
      }
    });
  });
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-total').textContent = total;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function answer(blockIdx, qIdx, chosen) {
  const key = `${blockIdx}_${qIdx}`;
  if (answered[key] !== undefined) return;
  answered[key] = { chosen };
  const q = BLOCKS[blockIdx].questions[qIdx];
  if (chosen !== q.correct) autoFlag(blockIdx, qIdx);
  if (flaggedMode) {
    renderFlaggedQuestion();
  } else {
    renderQuestion(blockIdx, qIdx);
  }
  updateScore();
}

function nextQuestion() {
  if (flaggedMode) {
    if (currentFlaggedIdx < flaggedList.length - 1) {
      currentFlaggedIdx++;
      renderFlaggedQuestion();
      updateFlaggedProgress();
      updateFlaggedNav();
    } else {
      alert(`To wszystkie oflagowane pytania (${flaggedList.length}). Możesz odznaczać te, które już opanowałaś.`);
    }
    return;
  }
  const block = BLOCKS[currentBlock];
  if (currentQ < block.questions.length - 1) {
    currentQ++;
    renderQuestion(currentBlock, currentQ);
    updateProgress(currentBlock);
    updateNav(currentBlock);
  } else {
    showBlockSummary(currentBlock);
  }
}

function prevQuestion() {
  if (flaggedMode) {
    if (currentFlaggedIdx > 0) {
      currentFlaggedIdx--;
      renderFlaggedQuestion();
      updateFlaggedProgress();
      updateFlaggedNav();
    }
    return;
  }
  if (currentQ > 0) {
    currentQ--;
    renderQuestion(currentBlock, currentQ);
    updateProgress(currentBlock);
    updateNav(currentBlock);
  }
}

function showBlockSummary(blockIdx) {
  const block = BLOCKS[blockIdx];
  const area = document.getElementById('question-area');
  const summary = document.getElementById('block-summary');
  area.style.display = 'none';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = true;

  let correct = 0;
  block.questions.forEach((q, qi) => {
    const k = `${blockIdx}_${qi}`;
    if (answered[k] && answered[k].chosen === q.correct) correct++;
  });
  const answered_n = block.questions.filter((_, qi) => answered[`${blockIdx}_${qi}`] !== undefined).length;
  const pct = answered_n > 0 ? Math.round(correct / answered_n * 100) : 0;

  document.getElementById('bs-score').textContent = `${correct}/${answered_n}`;
  document.getElementById('bs-title').textContent = `Blok ukończony: ${block.shortName}`;
  document.getElementById('bs-text').textContent = `Poprawne odpowiedzi: ${correct} z ${answered_n} (${pct}%). ${pct >= 70 ? 'Świetnie! 🎉' : pct >= 50 ? 'Nieźle, ale powtórz materiał.' : 'Wróć do notatek i spróbuj ponownie.'}`;
  summary.classList.add('visible');
}

function nextBlock() {
  if (currentBlock < BLOCKS.length - 1) {
    switchBlock(currentBlock + 1);
  } else {
    showAllDone();
  }
}

function restartBlock() {
  const block = BLOCKS[currentBlock];
  block.questions.forEach((_, qi) => {
    delete answered[`${currentBlock}_${qi}`];
  });
  currentQ = 0;
  document.getElementById('block-summary').classList.remove('visible');
  renderBlock(currentBlock);
  document.getElementById('btn-prev').disabled = false;
  document.getElementById('btn-next').disabled = false;
  updateScore();
}

function showAllDone() {
  document.getElementById('block-summary').classList.remove('visible');
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = true;

  let correct = 0, total = 0;
  BLOCKS.forEach((b, bi) => {
    b.questions.forEach((q, qi) => {
      const k = `${bi}_${qi}`;
      if (answered[k] !== undefined) { total++; if (answered[k].chosen === q.correct) correct++; }
    });
  });
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('ad-score').textContent = `${correct}/${total}`;
  document.getElementById('ad-text').textContent = `Ukończyłeś/aś wszystkie bloki. Wynik końcowy: ${correct} z ${total} poprawnych (${pct}%). ${pct >= 70 ? 'Jesteś gotowy/a na egzamin!' : 'Wróć do trudniejszych bloków i powtórz.'}`;
  document.getElementById('all-done').style.display = 'block';
}

function restartAll() {
  answered = {};
  currentBlock = 0;
  currentQ = 0;
  flaggedMode = false;
  document.getElementById('all-done').style.display = 'none';
  document.getElementById('btn-prev').disabled = false;
  document.getElementById('btn-next').disabled = false;
  switchBlock(0);
  updateScore();
}

init();
</script>
</body>
</html>
